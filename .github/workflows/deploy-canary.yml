name: Deploy CANARY (/STM_next)

on:
  workflow_dispatch:

env:
  # === Build-Variablen ===
  VITE_BASE: /STM_next/
  VITE_HORIZON_URL: https://horizon.stellar.org
  # Optional: nur setzen, wenn vorhanden – sonst Zeile löschen
  # VITE_BACKEND_URL: https://<DEINE-DOMAIN>/api

  # === Zielpfad auf cyon ===
  REMOTE_PATH: /home/michael/public_html/STM_next/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (frontend)
        working-directory: frontend
        run: npm ci

      - name: Build (VITE_BASE=/STM_next/)
        working-directory: frontend
        env:
          VITE_BASE: ${{ env.VITE_BASE }}
          VITE_HORIZON_URL: ${{ env.VITE_HORIZON_URL }}
          VITE_BACKEND_URL: ${{ env.VITE_BACKEND_URL }}
        run: |
          npm run build

          # Build-Beweis-Skript laeuft NACH dem Build, da frontend/dist/ vorher
          # noch nicht existiert (writeFileSync in gen-build-info.mjs erwartet den
          # Ordner bereits vorhanden). Liegt im Repo-Root, nicht unter frontend/.
          if [ -f ../scripts/gen-build-info.mjs ]; then (cd .. && node scripts/gen-build-info.mjs); fi

          # .htaccess aus Template erzeugen (BASE ohne Slash am Ende!)
          BASE_NO_TRAIL="${VITE_BASE%/}"
          sed "s#__BASE__#${BASE_NO_TRAIL}#g" ./.htaccess.template > ./dist/.htaccess

          # Smoke-Check: Base in index.html
          grep -n "${VITE_BASE}" ./dist/index.html || (echo "Base nicht gefunden" && exit 1)

          # dist nachtraeglich hashen (nach build-info.json/.htaccess, damit beide
          # im Manifest landen)
          if [ -f ../scripts/hash-dist.mjs ]; then (cd .. && node scripts/hash-dist.mjs); fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CYON_SSH_KEY }}

      - name: Trust cyon host key
        run: |
          mkdir -p ~/.ssh
          set -x
          nc -zv -w 10 "${{ secrets.CYON_HOST }}" 22 || echo "Port 22 nicht erreichbar"
          ssh-keyscan -v -T 10 -H "${{ secrets.CYON_HOST }}" >> ~/.ssh/known_hosts
          echo "ssh-keyscan exit code: $?"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            frontend/dist/ \
            "${{ secrets.CYON_USER }}@${{ secrets.CYON_HOST }}:${{ env.REMOTE_PATH }}"

      - name: Remote smoke test (index.html & build-info.json)
        run: |
          ssh "${{ secrets.CYON_USER }}@${{ secrets.CYON_HOST }}" \
            "test -f ${REMOTE_PATH}index.html && (test -f ${REMOTE_PATH}build-info.json || true)"
